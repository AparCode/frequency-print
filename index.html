<!DOCTYPE html> 
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="favicon-16x16.png">
<html> 
<head>
  <title>FrequencyPrint</title>
  </head>
  <body> 
    <h1>FrequencyPrint</h1> 
    <h2>About</h2>
    <p>FrequencyPrint is an AI-powered tool that analyzes an audio file and 
    checks to see whether it's "deepfake" generated or not. </p>
    <input type="file" id="audio" accept="audio/*"> 
    <audio id="audioPlayer" controls></audio> 

    <div style="margin-top: 12px;"> 
      <button id="predictBtn" type="button">Run Prediction</button> 
      <p id="predictionResult"></p> 
    </div> 
    <script src="main.js"></script> 
  </body> 
</html>
